<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->

<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-xl font-headline font-bold tracking-[0.2em] text-[#7c5455]">SMILEY NAIL BAR</h1>
<div class="w-8 h-8 rounded-full overflow-hidden hover:scale-105 transition-transform duration-300">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Stylist profile portrait with soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCSW99loRTy5d8wo8W8ty6NvailpXttfc5okoOFtI0DBOLRPBjMfY2UbJqfPaG8fB7ho5EFQSbw25N7EdGAj8YFm4hZM3gut3B4pUwXL2MFBRh5Ry7Ec-viyO3tUHOnnZdb6APmFFGAfs7uqaVzR_vClvi-H-p3eI8whtKL18fLTPsCQKZZd-25bteLWP9dq1Zc70jmJVibpd35VXtAbWodL4OJGNi6rvleDROwvRvKT0CW6DB11VMOcGfZNNVoKKeyq7mdFlQZPq8"/>
</div>
</header>
<main class="flex-grow px-6 pt-8 pb-32 max-w-2xl mx-auto w-full">
<!-- Hero Section -->
<div class="mb-12">
<p class="font-label text-xs uppercase tracking-[0.2em] text-secondary mb-2">Reservation</p>
<h2 class="font-headline text-4xl font-extrabold text-on-surface leading-tight">Secure Your <span class="text-primary italic">Moment.</span></h2>
</div>
<!-- Booking Form Container -->
<div class="space-y-10">
<!-- Step 1: Identity -->
<section class="bg-surface-container-low rounded-lg p-6 space-y-6">
<h3 class="font-headline font-bold text-lg text-on-surface-variant flex items-center gap-2">
<span class="w-6 h-6 rounded-full bg-primary text-white text-[10px] flex items-center justify-center">01</span>
                    Personal Details
                </h3>
<div class="space-y-4">
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest text-secondary mb-2 px-1">Full Name</label>
<input class="w-full h-14 px-5 bg-surface-container-lowest border-none rounded-DEFAULT text-on-surface placeholder:text-outline-variant/60 focus:ring-4 focus:ring-primary/10 transition-all duration-300 outline-none" placeholder="e.g. Osxent Mutalemwa" type="text"/>
</div>
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest text-secondary mb-2 px-1">Phone Number</label>
<input class="w-full h-14 px-5 bg-surface-container-lowest border-none rounded-DEFAULT text-on-surface placeholder:text-outline-variant/60 focus:ring-4 focus:ring-primary/10 transition-all duration-300 outline-none" placeholder="+256 743946261" type="tel"/>
</div>
</div>
</section>
<!-- Step 2: Service Selection -->
<section class="bg-surface-container-low rounded-lg p-6 space-y-6">
<h3 class="font-headline font-bold text-lg text-on-surface-variant flex items-center gap-2">
<span class="w-6 h-6 rounded-full bg-primary text-white text-[10px] flex items-center justify-center">02</span>
                    Curated Service
                </h3>
<div class="relative group">
<label class="block font-label text-[10px] uppercase tracking-widest text-secondary mb-2 px-1">Select Treatment</label>
<select class="w-full h-14 px-5 bg-surface-container-lowest border-none rounded-DEFAULT text-on-surface appearance-none focus:ring-4 focus:ring-primary/10 transition-all duration-300 outline-none">
<option disabled="" selected="" value="">Choose your experience...</option>
<option value="sculpted">Signature Sculpted Gel — $120</option>
<option value="minimalist">Minimalist Japanese Mani — $85</option>
<option value="editorial">Editorial Nail Art — $150</option>
<option value="restorative">Restorative Spa Ritual — $95</option>
</select>
<span class="material-symbols-outlined absolute right-5 top-[52px] text-secondary pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</section>
<!-- Step 3: Schedule -->
<section class="bg-surface-container-low rounded-lg p-6 space-y-6">
<h3 class="font-headline font-bold text-lg text-on-surface-variant flex items-center gap-2">
<span class="w-6 h-6 rounded-full bg-primary text-white text-[10px] flex items-center justify-center">03</span>
                    DateTime Selection
                </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest text-secondary mb-2 px-1">Date</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-lowest border-none rounded-DEFAULT text-on-surface focus:ring-4 focus:ring-primary/10 transition-all duration-300 outline-none" type="date"/>
<span class="material-symbols-outlined absolute right-5 top-4 text-secondary pointer-events-none" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest text-secondary mb-2 px-1">Time</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-lowest border-none rounded-DEFAULT text-on-surface focus:ring-4 focus:ring-primary/10 transition-all duration-300 outline-none" type="time"/>
<span class="material-symbols-outlined absolute right-5 top-4 text-secondary pointer-events-none" data-icon="schedule">schedule</span>
</div>
</div>
</div>
</section>
<!-- Confirm Button -->
<div class="pt-4">
<button class="w-full h-16 bg-primary text-on-primary rounded-full font-headline font-bold text-lg tracking-widest hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-[0_8px_32px_rgba(124,84,85,0.2)] flex items-center justify-center gap-3">
                    Confirm Booking
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center mt-6 text-xs text-secondary font-label leading-relaxed opacity-70">
                    A confirmation SMS will be sent shortly after approval. <br/> 24-hour cancellation policy applies.
                </p>
</div>
</div>

<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span></a>
</a>
<!-----contact-->
<a href="contact.html">
<a class="flex flex-col items-center justify-center text-[#675c56] hover:bg-[#efe0d8] rounded-full transition-colors w-12 h-12" href="contact.html">
<span class="material-symbols-outlined" data-icon="chat">call</span></a>
</a>
</div>
