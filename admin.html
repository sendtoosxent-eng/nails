<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#d2c4bc",
              "on-error": "#ffffff",
              "surface-variant": "#e4e2e0",
              "inverse-primary": "#edbabb",
              "surface-bright": "#fbf9f7",
              "secondary-container": "#efe0d8",
              "inverse-on-surface": "#f2f0ee",
              "outline": "#837473",
              "secondary-fixed": "#efe0d8",
              "primary-container": "#d7a6a7",
              "on-tertiary-fixed": "#261900",
              "on-tertiary-container": "#5a4000",
              "on-secondary-container": "#6d625c",
              "on-surface-variant": "#514443",
              "tertiary-fixed-dim": "#e9c176",
              "surface": "#fbf9f7",
              "tertiary-container": "#d2ac64",
              "tertiary-fixed": "#ffdea5",
              "error": "#ba1a1a",
              "surface-tint": "#7c5455",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "inverse-surface": "#30302f",
              "surface-dim": "#dbdad8",
              "surface-container": "#efedec",
              "surface-container-high": "#eae8e6",
              "primary-fixed": "#ffdada",
              "on-background": "#1b1c1b",
              "tertiary": "#775a19",
              "secondary": "#675c56",
              "on-secondary-fixed": "#211a15",
              "on-tertiary-fixed-variant": "#5d4201",
              "surface-container-low": "#f5f3f1",

              "on-error-container": "#93000a",
              "background": "#fbf9f7",

              "primary-fixed-dim": "#edbabb",

              "surface-container-highest": "#e4e2e0"

            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        background-color: rgba(251, 249, 247, 0.8);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface min-h-screen flex items-center justify-center selection:bg-primary-fixed selection:text-on-primary-fixed-variant">
<!-- Background Decoration (The "Tactile Atelier" organic shapes) -->
<div class="fixed inset-0 overflow-hidden -z-10">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[60%] rounded-full bg-secondary-container/30 blur-[120px]"></div>
<div class="absolute bottom-[5%] -right-[5%] w-[35%] h-[50%] rounded-full bg-primary-container/20 blur-[100px]"></div>
</div>
<main class="w-full max-w-md px-6 py-12">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-12">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-6 shadow-[0_8px_32px_rgba(124,84,85,0.15)]">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="brush">brush</span>
</div>
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-2">SMILEY NAIL BAR</h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-secondary font-bold">Admin Portal</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0_8px_32px_rgba(27,28,27,0.04)]">
<header class="mb-8">
<h2 class="font-headline text-xl font-bold text-on-surface-variant mb-1">Welcome back</h2>
<p class="text-on-surface-variant/60 text-sm">Please enter your credentials to access the nail bar</p>
</header>
<form class="space-y-6" action="dash.html">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-xs font-bold uppercase tracking-wider text-secondary ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-outline-variant/60 focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" name="email" placeholder="osxent@smileynailbar.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-xs font-bold uppercase tracking-wider text-secondary" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-on-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-outline-variant/60 focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-low transition-all" id="remember" type="checkbox"/>
<label class="ml-3 text-sm text-on-surface-variant font-medium" for="remember">Remember this session</label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-full shadow-[0_8px_24px_rgba(124,84,85,0.2)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 mt-4" type="submit">
                    Sign In
                </button>
</form>
</div>
<!-- Footer Links -->
<footer class="mt-12 text-center space-y-4">
<p class="text-sm text-on-surface-variant/50">
                © 2026 Smiley Nail Bar. <br/> .
            </p>
<div class="flex justify-center gap-6">
<a class="text-xs font-bold text-secondary uppercase tracking-widest hover:text-primary transition-colors" href="#">Help</a>
<a class="text-xs font-bold text-secondary uppercase tracking-widest hover:text-primary transition-colors" href="#">Privacy</a>
<a class="text-xs font-bold text-secondary uppercase tracking-widest hover:text-primary transition-colors" href="#">Security</a>
</div>
</footer>
</main>
<!-- Bottom Decorative Image (Subtle Luxury Reveal) -->
<div class="fixed bottom-12 -right-12 w-64 h-64 opacity-10 pointer-events-none transform rotate-12">
<img alt="Luxury nail art close up" class="w-full h-full object-cover rounded-xl grayscale" data-alt="Close up of minimalist luxury manicured hands" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDL3CxvhGNO-JmiZCQ0rS8vaG8u-4r9RaVnvq9ShPz33diFpvjDSEGSc3TKx1snuF7Jyi617T0QBIW3eVfh1kP2-UpmmVylM8da-4B_4rUjMgKq-SxD_cXQIDJKQxzeFzTM-u4SjMqp78TiooGK4vNorcDrs1U7LASRmreXlaCaSGo2sdxVzt-6K4a3R4600ZCyxwSJ5En4NQxRLs1hc8TqQBonDkx_O0IVF4OAv4aOgfQbxw-kv0G4RbX9TPOPeB8zBSaiTWIk4kQ"/>
</div>
</body></html>
